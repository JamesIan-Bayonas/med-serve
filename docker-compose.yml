version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: medserve-app
    container_name: medserve-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - medserve-network

  webserver:
    image: nginx:alpine
    container_name: medserve-webserver  
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
      - "5173:5173" # Exposed for Vite Hot Module Replacement
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - medserve-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: medserve-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-medserve_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-medserve_user}
    ports:
      - "3307:3306"
    volumes:
      - medserve-mysql-data:/var/lib/mysql
    networks:
      - medserve-network

networks:
  medserve-network:
    driver: bridge

volumes:
  medserve-mysql-data: